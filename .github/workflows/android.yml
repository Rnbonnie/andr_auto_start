name: Android CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew || true

    - name: Build with Gradle
      run: ./gradlew assembleDebug assembleRelease

    - name: Backup APKs
      run: |
        mkdir -p old_apks
        cp app/build/outputs/apk/release/*.apk old_apks/ || true

    - name: Build backport with Gradle
      run: ./gradlew assembleRelease -Pbackport

    - name: Restore APKs
      run: cp old_apks/*.apk app/build/outputs/apk/release/ || true

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apks
        path: app/build/outputs/apk/**/*.apk

  release:
    needs: build
    # Запускаем релиз ТОЛЬКО при пуше в main (чтобы он не создавался при пулл-реквестах)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    
    - name: Download APK
      uses: actions/download-artifact@v4
      with:
        name: apks
        # Скачиваем в определенную папку, чтобы экшен точно её нашёл
        path: ./downloaded-artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        # Генерируем имя тега на лету (например, build-42)
        tag_name: "build-${{ github.run_number }}"
        name: "Автоматический релиз #${{ github.run_number }}"
        body: |
          Автоматический билд из ветки main.

          Сообщение коммита:
          ${{ github.event.head_commit.message }}

          Хэш коммита: ${{ github.sha }}
        files: "./downloaded-artifacts/**/*.apk"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
